version: "3.9"

services:
  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: judge-loop-postgres
    environment:
      POSTGRES_USER: judgeloop
      POSTGRES_PASSWORD: judgeloop
      POSTGRES_DB: judgeloop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../internal/storage/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judgeloop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: judge-loop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────
  # Application services
  # ─────────────────────────────────────────

  api-server:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api-server
    container_name: judge-loop-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://judgeloop:judgeloop@postgres:5432/judgeloop?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  judge-worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.judge-worker
    container_name: judge-loop-worker
    environment:
      DATABASE_URL: postgres://judgeloop:judgeloop@postgres:5432/judgeloop?sslmode=disable
      REDIS_URL: redis://redis:6379
    volumes:
      # Worker needs access to Docker socket to spawn sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
